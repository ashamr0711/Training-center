<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>register</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="registration-wrapper">
    <div class="reg-left">
        <div class="brand-box">
            <h1>RJ</h1>
            <p>Technology</p>
            <div class="sub-brand">M.VERVE</div>
            <p class="tagline">Inspired Applications</p>
        </div>
        <p class="reg-footer-text">To connect with us please enter the details</p>
    </div>

    <div class="reg-right">
        <h2>Create an account</h2>
        <form class="reg-form">
            <div class="form-row">
                <div class="input-group">
                    <label>First Name</label>
                    <input type="text" placeholder="First Name">
                </div>
                <div class="input-group">
                    <label>Last Name</label>
                    <input type="text" placeholder="Last Name">
                </div>
                <div class="input-group">
                    <label>Age</label>
                    <input type="number" placeholder="18-100">
                </div>
            </div>

            <div class="form-row">
                <div class="input-group">
                    <label>Mobile Number</label>
                    <input type="tel" placeholder="** **">
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" placeholder="abc@xxx.zzz">
                </div>
            </div>

            <div class="input-group full">
                <label>Description</label>
                <textarea placeholder="emailhc@gmail.com"></textarea>
                <medium style="text-align: right ;">Max 150 characters</medium>
            </div>

            <div class="form-row">
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" placeholder="*********">
                </div>
                <div class="input-group">
                    <label>Confirm Password</label>
                    <input type="password" placeholder="">
                </div>
            </div>

            <div class="form-btns">
                <button type="reset" class="btn-reset" >RESET</button>
                <button type="submit" class="btn-submit-reg">SUBMIT</button>
                <a href="courses.html" class="close-reg">&times;</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
